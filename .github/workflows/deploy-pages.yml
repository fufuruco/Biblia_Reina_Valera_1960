name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Give the workflow explicit permissions for Pages and repo contents
permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages (gh-pages)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages via peaceiris
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
